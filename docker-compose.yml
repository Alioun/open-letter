services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
      - BASE_URL=${BASE_URL:-https://gehaltsdeckel.jetzt}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://gehaltsdeckel.jetzt,https://gehaltsdeckel-jetzt.de}
      - NODE_ENV=production
      - SMTP_HOST=haraka
      - SMTP_PORT=587
    depends_on:
      db:
        condition: service_healthy
        required: false
      haraka:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:18-alpine
    profiles:
      - with-db
    environment:
      - POSTGRES_DB=diaetendeckel
      - POSTGRES_USER=diaetendeckel
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaetendeckel"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  haraka:
    build:
      context: ./haraka
    ports:
      - "25:25"
    volumes:
      - ./haraka/config/dkim:/haraka/config/dkim:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
